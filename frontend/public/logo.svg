<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="APIStress">
  <defs>
    <linearGradient id="as-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FF6B35"/>
      <stop offset="55%" stop-color="#E0341A"/>
      <stop offset="100%" stop-color="#7C1D6F"/>
    </linearGradient>
    <linearGradient id="as-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="as-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFB347" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square badge -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#as-grad)"/>
  <rect x="4" y="4" width="56" height="32" rx="14" fill="url(#as-shine)"/>
  <circle cx="32" cy="32" r="24" fill="url(#as-glow)"/>

  <!-- Stress gauge arc -->
  <path d="M 14 38 A 18 18 0 0 1 50 38"
        fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Active arc (red zone) -->
  <path d="M 38 22 A 18 18 0 0 1 50 38"
        fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Lightning bolt + needle -->
  <path d="M 30 18 L 22 36 L 30 36 L 26 50 L 40 30 L 32 30 L 36 18 Z"
        fill="#ffffff" stroke="#ffffff" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Pivot dot -->
  <circle cx="32" cy="38" r="2.5" fill="#ffffff"/>
</svg>
