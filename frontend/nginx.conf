server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets so the SPA boots quickly behind any proxy.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  # Don't cache the entry HTML — must always pick up the latest hashed bundle.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }

  # SPA fallback for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed static assets.
  location ~* \.(?:js|css|svg|woff2?|ico|png|jpg|jpeg|webp|gif|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Hide nginx version banner.
  server_tokens off;
}
